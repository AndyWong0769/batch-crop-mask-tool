name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --icon="assets/1.ico" --name="BatchCropMaskTool" batch-crop-mask-tool.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatchCropMaskTool-Windows
          path: dist/BatchCropMaskTool.exe

  # ── macOS ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build macOS App Bundle
        run: |
          pyinstaller --windowed \
            --icon="assets/1.icns" \
            --name="BatchCropMaskTool" \
            --osx-bundle-identifier="com.andywong.batch-crop-mask-tool" \
            --add-data "assets:assets" \
            batch-crop-mask-tool.py
          # Verify the .app was created
          ls -la dist/

      - name: Package into DMG
        run: |
          APP="dist/BatchCropMaskTool.app"

          # If --onedir produced a folder instead, find the .app
          if [ ! -e "$APP" ]; then
            APP=$(find dist -name "*.app" -maxdepth 2 | head -1)
          fi

          echo "Using app: $APP"

          # Create DMG staging
          mkdir -p dmg_staging
          cp -R "$APP" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          # Create DMG with background image support
          hdiutil create -volname "BatchCropMaskTool" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            dist/BatchCropMaskTool.dmg

          echo "DMG created:"
          ls -lh dist/BatchCropMaskTool.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatchCropMaskTool-macOS
          path: dist/BatchCropMaskTool.dmg

  # ── Release ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: BatchCropMaskTool-*
          merge-multiple: true
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/BatchCropMaskTool.exe
            release/BatchCropMaskTool.dmg
          generate_release_notes: true
