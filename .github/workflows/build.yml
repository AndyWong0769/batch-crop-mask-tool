name: Build BatchCropMaskTool (macOS DMG · Intel x64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Use Rosetta 2 to install Intel Python via /usr/local/ Homebrew
      # so the .app runs on Intel Macs (including VMware VMs).
      # ------------------------------------------------------------------
      - name: Setup Rosetta 2 Intel Homebrew
        run: |
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
              < /dev/null || true
          fi
          echo "Intel Homebrew ready"

      - name: Install Intel Python & PyInstaller
        run: |
          arch -x86_64 /bin/bash -c '
            eval "$(/usr/local/bin/brew shellenv)"
            brew install python@3.11 python-tk || true
            python3.11 -m pip install --upgrade pip
            python3.11 -m pip install -r requirements.txt
          '

      # ------------------------------------------------------------------
      # Build .app bundle with PyInstaller (Intel x64)
      # ------------------------------------------------------------------
      - name: Build app bundle
        run: |
          arch -x86_64 /bin/bash -c '
            eval "$(/usr/local/bin/brew shellenv)"
            export MACOSX_DEPLOYMENT_TARGET=11.0
            ls -la 1.icns
            python3.11 -m PyInstaller --noconsole --windowed --onefile \
              --name "BatchCropMaskTool" \
              --icon="1.icns" \
              "batch-crop-mask-tool.py"
          '

      # ------------------------------------------------------------------
      # Create DMG installer
      # ------------------------------------------------------------------
      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p output

          create-dmg \
            --volname "BatchCropMaskTool" \
            --volicon "1.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BatchCropMaskTool.app" 175 190 \
            --hide-extension "BatchCropMaskTool.app" \
            --app-drop-link 425 190 \
            "output/BatchCropMaskTool_Installer.dmg" \
            "dist/BatchCropMaskTool.app"

      # ------------------------------------------------------------------
      # Upload DMG as artifact
      # ------------------------------------------------------------------
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: BatchCropMaskTool-macOS-DMG
          path: output/BatchCropMaskTool_Installer.dmg
